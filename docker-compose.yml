services:
  web:
    build: .
    image: colorblind-filter
    ports:
      # Host port (override with HOST_PORT) maps to the container's 3001.
      # Point your separately-run cloudflared (or any proxy) at this.
      - "${HOST_PORT:-3001}:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped
